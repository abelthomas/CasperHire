<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1. Role Configuration — CasperHire Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{--blue:#3B82F6;--green:#22C55E;--orange:#F59E0B;--purple:#8B5CF6;--red:#EF4444;--teal:#0D9488;--gray-50:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--connector:#94A3B8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);padding:48px 32px;min-height:100vh;}
  .page-header{text-align:center;margin-bottom:40px;}
  .page-header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-header .subtitle{font-size:14px;color:var(--gray-500);font-weight:400;line-height:1.5;}
  .page-header .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px;padding:16px 24px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;max-width:820px;margin-left:auto;margin-right:auto;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-700);font-weight:500;}
  .legend-shape{width:28px;height:20px;flex-shrink:0;}
  .flow-wrapper{display:flex;justify-content:center;overflow:auto;padding:16px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="section-label">WBS Section 1 of 7</div>
  <h1>Role Configuration</h1>
  <div class="subtitle">Leo creates or edits a role with structured requirements and scoring rubric.<br>This role definition drives all downstream resume screening.</div>
</div>
<div class="legend">
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--blue)"/></svg>Start / End</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--teal)"/></svg>Process</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="14,1 27,10 14,19 1,10" fill="var(--orange)"/></svg>Decision</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="5,19 1,1 23,1 27,19" fill="var(--purple)"/></svg>Input / Data</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--red)"/></svg>Error State</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--green)"/></svg>Success / End</div>
</div>
<div class="flow-wrapper">
<svg viewBox="0 0 840 1100" width="840" height="1100" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <!-- START -->
  <rect x="290" y="20" width="260" height="48" rx="24" fill="var(--blue)"/>
  <text x="420" y="49" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Leo opens CasperHire</text>

  <line x1="420" y1="68" x2="420" y2="115" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,113 420,123 426,113" fill="var(--connector)"/>

  <!-- DECISION -->
  <polygon points="420,125 540,195 420,265 300,195" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="190" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">New role or</text>
  <text x="420" y="205" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">edit existing?</text>

  <!-- LEFT: New -->
  <line x1="300" y1="195" x2="190" y2="195" stroke="var(--connector)" stroke-width="2"/>
  <text x="245" y="185" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">New</text>
  <line x1="190" y1="195" x2="190" y2="298" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="184,296 190,306 196,296" fill="var(--connector)"/>

  <rect x="70" y="308" width="240" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="190" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Create New Role</text>
  <text x="190" y="350" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Title, department, level</text>

  <!-- RIGHT: Existing -->
  <line x1="540" y1="195" x2="650" y2="195" stroke="var(--connector)" stroke-width="2"/>
  <text x="595" y="185" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Existing</text>
  <line x1="650" y1="195" x2="650" y2="298" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="644,296 650,306 656,296" fill="var(--connector)"/>

  <rect x="530" y="308" width="240" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="650" y="333" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Load Existing Role</text>
  <text x="650" y="350" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Pull current configuration</text>

  <!-- Merge lines FIRST so annotation renders on top -->
  <line x1="190" y1="368" x2="190" y2="450" stroke="var(--connector)" stroke-width="2"/>
  <line x1="650" y1="368" x2="650" y2="450" stroke="var(--connector)" stroke-width="2"/>
  <line x1="190" y1="450" x2="650" y2="450" stroke="var(--connector)" stroke-width="2"/>
  <circle cx="420" cy="450" r="5" fill="var(--connector)"/>

  <!-- Annotation AFTER lines so it renders on top -->
  <rect x="535" y="380" width="230" height="42" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="650" y="398" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">⚠ Edits apply to future screenings</text>
  <text x="650" y="412" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">only — no retroactive re-scoring</text>

  <line x1="420" y1="455" x2="420" y2="490" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,488 420,498 426,488" fill="var(--connector)"/>

  <!-- INPUT: Requirements -->
  <polygon points="325,505 305,575 535,575 515,505" fill="var(--purple)" stroke="#7C3AED" stroke-width="2"/>
  <text x="420" y="530" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Define Requirements</text>
  <text x="420" y="546" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Skills (multi-select), experience</text>
  <text x="420" y="560" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">range, qualifications, deal-breakers</text>

  <line x1="420" y1="575" x2="420" y2="615" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,613 420,623 426,613" fill="var(--connector)"/>

  <!-- INPUT: Rubric -->
  <polygon points="325,630 305,700 535,700 515,630" fill="var(--purple)" stroke="#7C3AED" stroke-width="2"/>
  <text x="420" y="655" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Configure Rubric Weights</text>
  <text x="420" y="671" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">e.g. 40% skills, 30% experience,</text>
  <text x="420" y="685" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">30% domain fit</text>

  <line x1="420" y1="700" x2="420" y2="740" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,738 420,748 426,738" fill="var(--connector)"/>

  <!-- DECISION: Validation -->
  <polygon points="420,750 540,820 420,890 300,820" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="813" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Validation:</text>
  <text x="420" y="828" text-anchor="middle" fill="#fff" font-size="11">Weights = 100%?</text>
  <text x="420" y="842" text-anchor="middle" fill="#fff" font-size="11">Required fields?</text>

  <!-- RIGHT: Fail -->
  <line x1="540" y1="820" x2="648" y2="820" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="646,814 656,820 646,826" fill="var(--connector)"/>
  <text x="594" y="810" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Fail</text>

  <rect x="658" y="790" width="140" height="60" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="728" y="815" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Validation Error</text>
  <text x="728" y="831" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Fix weights / fields</text>

  <!-- Return loop — lines first -->
  <line x1="728" y1="790" x2="728" y2="665" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="728" y1="665" x2="538" y2="665" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="540,659 530,665 540,671" fill="var(--connector)"/>
  <!-- Label on top of line -->
  <rect x="618" y="650" width="80" height="18" rx="4" fill="#fff"/>
  <text x="658" y="663" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">Fix &amp; retry</text>

  <!-- DOWN: Pass -->
  <line x1="420" y1="890" x2="420" y2="930" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,928 420,938 426,928" fill="var(--connector)"/>
  <text x="435" y="918" fill="var(--gray-500)" font-size="11" font-weight="600">Pass</text>

  <rect x="290" y="940" width="260" height="48" rx="24" fill="var(--green)"/>
  <text x="420" y="969" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Role Saved ✓</text>

  <line x1="420" y1="988" x2="420" y2="1020" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,1018 420,1028 426,1018" fill="var(--connector)"/>

  <rect x="260" y="1030" width="320" height="48" rx="24" fill="var(--green)" opacity="0.75"/>
  <text x="420" y="1059" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">→ Ready for Resume Uploads (§2)</text>

</svg>
</div>
</body>
</html>
