<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7. CRM Handoff — CasperHire Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{--blue:#3B82F6;--green:#22C55E;--orange:#F59E0B;--purple:#8B5CF6;--red:#EF4444;--teal:#0D9488;--gray-50:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--connector:#94A3B8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);padding:48px 32px;min-height:100vh;}
  .page-header{text-align:center;margin-bottom:40px;}
  .page-header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-header .subtitle{font-size:14px;color:var(--gray-500);font-weight:400;line-height:1.5;}
  .page-header .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px;padding:16px 24px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;max-width:820px;margin-left:auto;margin-right:auto;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-700);font-weight:500;}
  .legend-shape{width:28px;height:20px;flex-shrink:0;}
  .flow-wrapper{display:flex;justify-content:center;overflow:auto;padding:16px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="section-label">WBS Section 7 of 7</div>
  <h1>CRM Handoff</h1>
  <div class="subtitle">Integration boundary between Feature 1 (Screening) and Feature 2 (CRM).<br>Approved candidates auto-flow into the CRM pipeline with full screening context.</div>
</div>
<div class="legend">
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--blue)"/></svg>Start / End</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--teal)"/></svg>Process</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="14,1 27,10 14,19 1,10" fill="var(--orange)"/></svg>Decision</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--red)"/></svg>Error State</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--green)"/></svg>Success / End</div>
</div>
<div class="flow-wrapper">
<svg viewBox="0 0 870 1380" width="870" height="1380" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <rect x="260" y="20" width="320" height="48" rx="24" fill="var(--blue)"/>
  <text x="420" y="49" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Leo approves candidate (from §5)</text>

  <line x1="420" y1="68" x2="420" y2="115" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,113 420,123 426,113" fill="var(--connector)"/>

  <!-- DECISION: Already approved? -->
  <polygon points="420,125 550,195 420,265 290,195" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="188" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Already</text>
  <text x="420" y="203" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">approved?</text>

  <!-- RIGHT: Already approved -->
  <line x1="550" y1="195" x2="658" y2="195" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="656,189 666,195 656,201" fill="var(--connector)"/>
  <text x="604" y="185" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Yes</text>

  <rect x="670" y="170" width="130" height="50" rx="6" fill="var(--gray-500)" stroke="#4B5563" stroke-width="2"/>
  <text x="735" y="192" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">No-op</text>
  <text x="735" y="207" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Idempotent ✓</text>

  <rect x="665" y="230" width="155" height="35" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="742" y="246" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">No duplicate CRM record.</text>
  <text x="742" y="259" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">No pipeline state reset.</text>

  <!-- DOWN: Not yet -->
  <line x1="420" y1="265" x2="420" y2="310" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,308 420,318 426,308" fill="var(--connector)"/>
  <text x="435" y="293" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>

  <!-- DECISION: Existing in CRM? -->
  <polygon points="420,320 550,390 420,460 290,390" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="383" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Candidate exists</text>
  <text x="420" y="398" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">in CRM?</text>

  <!-- RIGHT: Exists — merge -->
  <line x1="550" y1="390" x2="658" y2="390" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="656,384 666,390 656,396" fill="var(--connector)"/>
  <text x="604" y="380" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Yes</text>

  <rect x="670" y="360" width="140" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="740" y="385" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Smart merge</text>
  <text x="740" y="402" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">New screening →</text>
  <text x="740" y="415" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">existing record</text>

  <!-- Smart merge arrow connects DOWN then LEFT to merge point with arrow -->
  <line x1="740" y1="420" x2="740" y2="510" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="740" y1="510" x2="425" y2="510" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="427,504 417,510 427,516" fill="var(--connector)"/>

  <!-- DOWN: New candidate -->
  <line x1="420" y1="460" x2="420" y2="505" stroke="var(--connector)" stroke-width="2"/>
  <text x="435" y="488" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>
  <circle cx="420" cy="510" r="5" fill="var(--connector)"/>
  <line x1="420" y1="515" x2="420" y2="550" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,548 420,558 426,548" fill="var(--connector)"/>

  <!-- PROCESS: Create/update -->
  <rect x="270" y="560" width="300" height="80" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="420" y="587" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Create / update CRM record</text>
  <text x="420" y="604" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Parsed data + role(s) + AI score</text>
  <text x="420" y="620" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">+ rationale + override (if any)</text>
  <text x="420" y="634" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">+ timestamp</text>

  <line x1="420" y1="640" x2="420" y2="675" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,673 420,683 426,673" fill="var(--connector)"/>

  <rect x="290" y="685" width="260" height="50" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="420" y="707" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Set initial pipeline stage</text>
  <text x="420" y="724" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">"Screened — Approved"</text>

  <line x1="420" y1="735" x2="420" y2="775" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,773 420,783 426,773" fill="var(--connector)"/>

  <!-- DECISION: Write succeeded? -->
  <polygon points="420,785 550,855 420,925 290,855" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="848" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CRM write</text>
  <text x="420" y="863" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">succeeded?</text>

  <!-- LEFT: Fail -->
  <line x1="290" y1="855" x2="168" y2="855" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="170,849 160,855 170,861" fill="var(--connector)"/>
  <text x="229" y="845" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Fail</text>

  <rect x="40" y="825" width="125" height="60" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="102" y="848" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Rollback</text>
  <text x="102" y="863" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Approval reverted</text>
  <text x="102" y="877" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">→ "Pending"</text>

  <rect x="30" y="895" width="145" height="50" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="102" y="913" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Leo is notified.</text>
  <text x="102" y="927" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Candidate stays in</text>
  <text x="102" y="940" text-anchor="middle" fill="var(--gray-700)" font-size="9" font-style="italic">shortlist, not lost.</text>

  <!-- DOWN: Success -->
  <line x1="420" y1="925" x2="420" y2="968" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,966 420,976 426,966" fill="var(--connector)"/>
  <text x="435" y="952" fill="var(--gray-500)" font-size="11" font-weight="600">Pass</text>

  <rect x="260" y="978" width="320" height="48" rx="24" fill="var(--green)"/>
  <text x="420" y="1006" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">✓ Candidate in CRM pipeline</text>

  <!-- REVERSAL PATH -->
  <rect x="270" y="1060" width="300" height="8" rx="2" fill="var(--gray-200)"/>

  <text x="420" y="1095" text-anchor="middle" fill="var(--gray-700)" font-size="16" font-weight="700">Reversal Path (Undo Approval)</text>
  <text x="420" y="1115" text-anchor="middle" fill="var(--gray-500)" font-size="12">Available only while candidate is in "Screened — Approved" stage</text>

  <rect x="290" y="1135" width="260" height="48" rx="24" fill="var(--orange)"/>
  <text x="420" y="1163" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Leo reverses approval</text>

  <line x1="420" y1="1183" x2="420" y2="1215" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="414,1213 420,1223 426,1213" fill="var(--connector)"/>

  <rect x="280" y="1225" width="280" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="420" y="1248" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Archive CRM record</text>
  <text x="420" y="1265" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Not deleted · Reason logged</text>
  <text x="420" y="1279" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">→ Back to shortlist as Flagged / Rejected</text>

  <!-- Boundary annotation — TALLER to fit all content -->
  <rect x="600" y="1215" width="220" height="75" rx="6" fill="#fff" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="710" y="1235" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-weight="600">Once candidate advances past</text>
  <text x="710" y="1250" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">"Screened — Approved" →</text>
  <text x="710" y="1265" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">reversal must happen in CRM</text>
  <text x="710" y="1280" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">(Feature 2 scope)</text>

</svg>
</div>
</body>
</html>
