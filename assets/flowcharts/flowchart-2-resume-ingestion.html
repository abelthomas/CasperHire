<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2. Resume Ingestion — CasperHire Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{--blue:#3B82F6;--green:#22C55E;--orange:#F59E0B;--purple:#8B5CF6;--red:#EF4444;--teal:#0D9488;--gray-50:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--connector:#94A3B8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);padding:48px 32px;min-height:100vh;}
  .page-header{text-align:center;margin-bottom:40px;}
  .page-header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-header .subtitle{font-size:14px;color:var(--gray-500);font-weight:400;line-height:1.5;}
  .page-header .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px;padding:16px 24px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;max-width:820px;margin-left:auto;margin-right:auto;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-700);font-weight:500;}
  .legend-shape{width:28px;height:20px;flex-shrink:0;}
  .flow-wrapper{display:flex;justify-content:center;overflow:auto;padding:16px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="section-label">WBS Section 2 of 7</div>
  <h1>Resume Ingestion</h1>
  <div class="subtitle">Leo uploads resumes individually or in bulk. The system validates files,<br>detects duplicates, and handles partial failures gracefully.</div>
</div>
<div class="legend">
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--blue)"/></svg>Start / End</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--teal)"/></svg>Process</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="14,1 27,10 14,19 1,10" fill="var(--orange)"/></svg>Decision</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="5,19 1,1 23,1 27,19" fill="var(--purple)"/></svg>Input / Data</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--red)"/></svg>Error State</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--green)"/></svg>Success / End</div>
</div>
<div class="flow-wrapper">
<svg viewBox="0 0 900 1380" width="900" height="1380" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <!-- START -->
  <rect x="290" y="20" width="300" height="48" rx="24" fill="var(--blue)"/>
  <text x="440" y="49" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Role exists → Upload resumes</text>

  <line x1="440" y1="68" x2="440" y2="115" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,113 440,123 446,113" fill="var(--connector)"/>

  <!-- DECISION: Single or Bulk -->
  <polygon points="440,125 560,195 440,265 320,195" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="440" y="190" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Single upload</text>
  <text x="440" y="205" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">or bulk?</text>

  <!-- LEFT: Single -->
  <line x1="320" y1="195" x2="200" y2="195" stroke="var(--connector)" stroke-width="2"/>
  <text x="260" y="185" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Single</text>
  <line x1="200" y1="195" x2="200" y2="288" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="194,286 200,296 206,286" fill="var(--connector)"/>

  <polygon points="115,303 95,363 305,363 285,303" fill="var(--purple)" stroke="#7C3AED" stroke-width="2"/>
  <text x="200" y="328" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Upload file</text>
  <text x="200" y="344" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">PDF or DOCX</text>

  <!-- RIGHT: Bulk -->
  <line x1="560" y1="195" x2="680" y2="195" stroke="var(--connector)" stroke-width="2"/>
  <text x="620" y="185" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Bulk (50+)</text>
  <line x1="680" y1="195" x2="680" y2="288" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="674,286 680,296 686,286" fill="var(--connector)"/>

  <polygon points="595,303 575,363 785,363 765,303" fill="var(--purple)" stroke="#7C3AED" stroke-width="2"/>
  <text x="680" y="324" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Upload batch</text>
  <text x="680" y="340" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Progress: "23/57 processed"</text>

  <!-- Merge -->
  <line x1="200" y1="363" x2="200" y2="415" stroke="var(--connector)" stroke-width="2"/>
  <line x1="680" y1="363" x2="680" y2="415" stroke="var(--connector)" stroke-width="2"/>
  <line x1="200" y1="415" x2="680" y2="415" stroke="var(--connector)" stroke-width="2"/>
  <circle cx="440" cy="415" r="5" fill="var(--connector)"/>

  <!-- "Loop" label rendered AFTER lines -->
  <rect x="335" y="392" width="210" height="18" rx="4" fill="#fff"/>
  <text x="440" y="405" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">↓ Loop through each resume ↓</text>

  <line x1="440" y1="420" x2="440" y2="460" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,458 440,468 446,458" fill="var(--connector)"/>

  <!-- DECISION: Valid format? -->
  <polygon points="440,470 560,535 440,600 320,535" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="440" y="530" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Valid format?</text>
  <text x="440" y="545" text-anchor="middle" fill="#fff" font-size="11">PDF / DOCX?</text>

  <!-- RIGHT: Invalid -->
  <line x1="560" y1="535" x2="678" y2="535" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="676,529 686,535 676,541" fill="var(--connector)"/>
  <text x="619" y="525" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Invalid</text>

  <rect x="690" y="505" width="150" height="55" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="765" y="528" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Reject file</text>
  <text x="765" y="544" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Clear error message</text>

  <line x1="765" y1="560" x2="765" y2="590" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <text x="765" y="605" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">→ Next file</text>

  <!-- DOWN: Valid -->
  <line x1="440" y1="600" x2="440" y2="640" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,638 440,648 446,638" fill="var(--connector)"/>
  <text x="455" y="625" fill="var(--gray-500)" font-size="11" font-weight="600">Valid</text>

  <!-- DECISION: Duplicate? -->
  <polygon points="440,650 560,715 440,780 320,715" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="440" y="710" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Duplicate</text>
  <text x="440" y="725" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">candidate?</text>

  <!-- RIGHT: Duplicate — arrow connects to left edge of diamond -->
  <line x1="560" y1="715" x2="628" y2="715" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="626,709 636,715 626,721" fill="var(--connector)"/>
  <text x="594" y="705" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Yes</text>

  <!-- Sub-decision: skip or replace — positioned so arrow connects cleanly -->
  <polygon points="700,715 770,760 700,805 630,760" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="700" y="755" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Skip or</text>
  <text x="700" y="770" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">replace?</text>

  <!-- Skip → terminator -->
  <line x1="770" y1="760" x2="838" y2="760" stroke="var(--connector)" stroke-width="2"/>
  <text x="804" y="750" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">Skip</text>
  <line x1="838" y1="760" x2="838" y2="798" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="832,796 838,806 844,796" fill="var(--connector)"/>

  <rect x="773" y="808" width="130" height="42" rx="21" fill="var(--gray-500)"/>
  <text x="838" y="827" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Skipped</text>
  <text x="838" y="841" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">→ Next file</text>

  <!-- Replace → merge back to main -->
  <line x1="700" y1="805" x2="700" y2="860" stroke="var(--connector)" stroke-width="2"/>
  <text x="715" y="838" fill="var(--gray-500)" font-size="10" font-weight="600">Replace</text>
  <line x1="700" y1="860" x2="440" y2="860" stroke="var(--connector)" stroke-width="2"/>

  <!-- DOWN: No duplicate -->
  <line x1="440" y1="780" x2="440" y2="860" stroke="var(--connector)" stroke-width="2"/>
  <text x="455" y="825" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>
  <circle cx="440" cy="860" r="5" fill="var(--connector)"/>
  <line x1="440" y1="865" x2="440" y2="900" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,898 440,908 446,898" fill="var(--connector)"/>

  <!-- PROCESS: Store file -->
  <rect x="300" y="910" width="280" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="440" y="935" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Store file + create record</text>
  <text x="440" y="952" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">1 resume → 1 candidate record</text>

  <line x1="440" y1="970" x2="440" y2="1005" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,1003 440,1013 446,1003" fill="var(--connector)"/>

  <!-- PROCESS: Associate with role -->
  <rect x="300" y="1015" width="280" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="440" y="1040" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Associate with role(s)</text>
  <text x="440" y="1057" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Candidate ↔ Role (many-to-many)</text>

  <!-- Loop back line FIRST, annotation ON TOP -->
  <line x1="440" y1="1075" x2="440" y2="1110" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,1108 440,1118 446,1108" fill="var(--connector)"/>

  <!-- Annotation: partial failure — rendered AFTER lines, opaque bg -->
  <rect x="40" y="1000" width="220" height="50" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="150" y="1020" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Partial failure: if 3/50 fail, 47</text>
  <text x="150" y="1034" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">proceed. Failures → error summary.</text>

  <!-- DECISION: More files? -->
  <polygon points="440,1120 540,1165 440,1210 340,1165" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="440" y="1160" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">More files</text>
  <text x="440" y="1175" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">in batch?</text>

  <!-- Loop back — lines first -->
  <line x1="340" y1="1165" x2="240" y2="1165" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="240" y1="1165" x2="240" y2="535" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="240" y1="535" x2="320" y2="535" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="318,529 328,535 318,541" fill="var(--connector)"/>
  <!-- Label on top -->
  <rect x="208" y="840" width="65" height="18" rx="4" fill="#fff"/>
  <text x="240" y="853" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">Next file</text>

  <!-- DOWN: Done -->
  <line x1="440" y1="1210" x2="440" y2="1250" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="434,1248 440,1258 446,1248" fill="var(--connector)"/>
  <text x="455" y="1235" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>

  <!-- END -->
  <rect x="270" y="1260" width="340" height="48" rx="24" fill="var(--green)"/>
  <text x="440" y="1289" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">→ All ingested · Ready for Parsing (§3)</text>

</svg>
</div>
</body>
</html>
