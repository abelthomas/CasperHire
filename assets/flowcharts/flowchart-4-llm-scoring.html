<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4. LLM Rubric Scoring — CasperHire Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{--blue:#3B82F6;--green:#22C55E;--orange:#F59E0B;--purple:#8B5CF6;--red:#EF4444;--teal:#0D9488;--gray-50:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--connector:#94A3B8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);padding:48px 32px;min-height:100vh;}
  .page-header{text-align:center;margin-bottom:40px;}
  .page-header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-header .subtitle{font-size:14px;color:var(--gray-500);font-weight:400;line-height:1.5;}
  .page-header .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px;padding:16px 24px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;max-width:820px;margin-left:auto;margin-right:auto;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-700);font-weight:500;}
  .legend-shape{width:28px;height:20px;flex-shrink:0;}
  .flow-wrapper{display:flex;justify-content:center;overflow:auto;padding:16px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="section-label">WBS Section 4 of 7</div>
  <h1>LLM Rubric Scoring</h1>
  <div class="subtitle">AI Step 2 — Score structured resume data against the role rubric using Claude.<br>Handles failures gracefully. Supports re-scoring on rubric changes.</div>
</div>
<div class="legend">
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--blue)"/></svg>Start / End</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--teal)"/></svg>Process</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="14,1 27,10 14,19 1,10" fill="var(--orange)"/></svg>Decision</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--red)"/></svg>Error State</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--green)"/></svg>Success / End</div>
</div>
<div class="flow-wrapper">
<svg viewBox="0 0 1020 1350" width="1020" height="1350" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <!-- Main flow at x=520 -->

  <rect x="370" y="20" width="300" height="48" rx="24" fill="var(--blue)"/>
  <text x="520" y="49" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Parsed candidate data (from §3)</text>

  <line x1="520" y1="68" x2="520" y2="110" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,108 520,118 526,108" fill="var(--connector)"/>

  <rect x="380" y="120" width="280" height="70" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="520" y="145" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Construct scoring prompt</text>
  <text x="520" y="162" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Structured data + role rubric</text>
  <text x="520" y="176" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">→ Claude Skill (version-controlled)</text>

  <line x1="520" y1="190" x2="520" y2="230" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,228 520,238 526,228" fill="var(--connector)"/>

  <!-- DECISION: Deal-breaker? -->
  <polygon points="520,240 640,310 520,380 400,310" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="520" y="303" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Deal-breaker</text>
  <text x="520" y="318" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">triggered?</text>

  <!-- RIGHT: Yes — auto flag -->
  <line x1="640" y1="310" x2="758" y2="310" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="756,304 766,310 756,316" fill="var(--connector)"/>
  <text x="699" y="300" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Yes</text>

  <rect x="770" y="280" width="160" height="60" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="850" y="305" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Auto-flag: Score = 1</text>
  <text x="850" y="322" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Rationale explains which</text>
  <text x="850" y="334" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">deal-breaker triggered</text>

  <line x1="850" y1="340" x2="850" y2="600" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="850" y1="600" x2="640" y2="600" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>

  <!-- DOWN: No -->
  <line x1="520" y1="380" x2="520" y2="420" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,418 520,428 526,418" fill="var(--connector)"/>
  <text x="535" y="405" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>

  <rect x="380" y="430" width="280" height="70" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="520" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Send to Claude API</text>
  <text x="520" y="472" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Generate: score (1–10) +</text>
  <text x="520" y="486" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">2–3 sentence rationale</text>

  <line x1="520" y1="500" x2="520" y2="540" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,538 520,548 526,538" fill="var(--connector)"/>

  <!-- DECISION: Valid response? -->
  <polygon points="520,550 640,615 520,680 400,615" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="520" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Valid response?</text>
  <text x="520" y="624" text-anchor="middle" fill="#fff" font-size="11">Int 1–10 + rationale</text>

  <!-- LEFT: Failure — MUCH further left, at x=100 -->
  <line x1="400" y1="615" x2="168" y2="615" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="170,609 160,615 170,621" fill="var(--connector)"/>
  <text x="284" y="605" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Fail</text>

  <rect x="95" y="585" width="130" height="60" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="160" y="608" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">LLM Failure</text>
  <text x="160" y="623" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Timeout / refusal /</text>
  <text x="160" y="635" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">malformed output</text>

  <line x1="160" y1="645" x2="160" y2="685" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="154,683 160,693 166,683" fill="var(--connector)"/>

  <!-- DECISION: 1st attempt? -->
  <polygon points="160,695 240,740 160,785 80,740" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="160" y="735" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1st</text>
  <text x="160" y="749" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">attempt?</text>

  <!-- LEFT from retry (going left, not right): Auto retry -->
  <line x1="80" y1="740" x2="28" y2="740" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="30,734 20,740 30,746" fill="var(--connector)"/>
  <text x="54" y="730" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">Yes</text>

  <rect x="10" y="760" width="110" height="44" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="65" y="779" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Auto-retry</text>
  <text x="65" y="793" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">w/ backoff</text>

  <!-- Retry loops back up to Send to Claude -->
  <line x1="65" y1="760" x2="65" y2="465" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="65" y1="465" x2="380" y2="465" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="378,459 388,465 378,471" fill="var(--connector)"/>

  <!-- DOWN: No more retries -->
  <line x1="160" y1="785" x2="160" y2="825" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="154,823 160,833 166,823" fill="var(--connector)"/>
  <text x="175" y="810" fill="var(--gray-500)" font-size="10" font-weight="600">No</text>

  <rect x="95" y="835" width="130" height="55" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="160" y="855" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Flag: "Manual</text>
  <text x="160" y="870" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Review Required"</text>
  <text x="160" y="883" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">Reason logged</text>

  <rect x="83" y="900" width="155" height="45" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="160" y="918" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">→ Separate queue,</text>
  <text x="160" y="932" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">not in ranked shortlist</text>

  <!-- DOWN: Valid (main flow) -->
  <line x1="520" y1="680" x2="520" y2="720" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,718 520,728 526,718" fill="var(--connector)"/>
  <text x="535" y="705" fill="var(--gray-500)" font-size="11" font-weight="600">Pass</text>

  <rect x="380" y="730" width="280" height="55" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="520" y="753" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Validate output schema</text>
  <text x="520" y="770" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Score: int 1–10, rationale: non-empty</text>

  <line x1="520" y1="785" x2="520" y2="820" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,818 520,828 526,818" fill="var(--connector)"/>

  <rect x="380" y="830" width="280" height="55" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="520" y="853" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Save score to record</text>
  <text x="520" y="870" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Score + rationale + timestamp</text>

  <line x1="520" y1="885" x2="520" y2="920" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,918 520,928 526,918" fill="var(--connector)"/>

  <!-- DECISION: More in batch? -->
  <polygon points="520,930 620,975 520,1020 420,975" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="520" y="970" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">More in</text>
  <text x="520" y="984" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">batch?</text>

  <!-- Loop back -->
  <line x1="620" y1="975" x2="710" y2="975" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="710" y1="975" x2="710" y2="150" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="710" y1="150" x2="660" y2="150" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="662,144 652,150 662,156" fill="var(--connector)"/>
  <rect x="678" y="555" width="65" height="18" rx="4" fill="#fff"/>
  <text x="710" y="568" text-anchor="middle" fill="var(--gray-500)" font-size="10" font-weight="600">Next</text>

  <!-- DOWN: Done -->
  <line x1="520" y1="1020" x2="520" y2="1060" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="514,1058 520,1068 526,1058" fill="var(--connector)"/>
  <text x="535" y="1045" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>

  <rect x="350" y="1070" width="340" height="48" rx="24" fill="var(--green)"/>
  <text x="520" y="1098" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">→ Scored · Ready for Shortlist (§5)</text>

  <rect x="350" y="1140" width="340" height="55" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="520" y="1160" text-anchor="middle" fill="var(--gray-700)" font-size="11" font-weight="600">↻ Re-score path</text>
  <text x="520" y="1175" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Leo can trigger re-score on rubric change.</text>
  <text x="520" y="1189" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Previous score preserved as history.</text>

</svg>
</div>
</body>
</html>
