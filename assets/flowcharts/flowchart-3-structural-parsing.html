<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3. Structural Parsing — CasperHire Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');
  :root{--blue:#3B82F6;--green:#22C55E;--orange:#F59E0B;--purple:#8B5CF6;--red:#EF4444;--teal:#0D9488;--gray-50:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--connector:#94A3B8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);padding:48px 32px;min-height:100vh;}
  .page-header{text-align:center;margin-bottom:40px;}
  .page-header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
  .page-header .subtitle{font-size:14px;color:var(--gray-500);font-weight:400;line-height:1.5;}
  .page-header .section-label{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:48px;padding:16px 24px;background:#fff;border:1px solid var(--gray-200);border-radius:12px;max-width:820px;margin-left:auto;margin-right:auto;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-700);font-weight:500;}
  .legend-shape{width:28px;height:20px;flex-shrink:0;}
  .flow-wrapper{display:flex;justify-content:center;overflow:auto;padding:16px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="section-label">WBS Section 3 of 7</div>
  <h1>Structural Parsing</h1>
  <div class="subtitle">Deterministic Step 1 — Extract structured data from raw resume files without AI.<br>Uses a dedicated parsing library. Testable with unit tests, no LLM dependency.</div>
</div>
<div class="legend">
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--blue)"/></svg>Start / End</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--teal)"/></svg>Process</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="14,1 27,10 14,19 1,10" fill="var(--orange)"/></svg>Decision</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><polygon points="5,19 1,1 23,1 27,19" fill="var(--purple)"/></svg>Output / Display</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="3" fill="var(--red)"/></svg>Error / Flag</div>
  <div class="legend-item"><svg class="legend-shape" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18" rx="9" fill="var(--green)"/></svg>Success / End</div>
</div>
<div class="flow-wrapper">
<svg viewBox="0 0 830 1100" width="830" height="1100" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <!-- START -->
  <rect x="260" y="20" width="300" height="48" rx="24" fill="var(--blue)"/>
  <text x="410" y="49" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Resume ingested (from §2)</text>

  <line x1="410" y1="68" x2="410" y2="110" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,108 410,118 416,108" fill="var(--connector)"/>

  <!-- PROCESS: Run parser -->
  <rect x="270" y="120" width="280" height="70" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="410" y="145" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Run structural parser</text>
  <text x="410" y="162" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Extract: name, email, phone,</text>
  <text x="410" y="176" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">experience, education, skills</text>

  <line x1="410" y1="190" x2="410" y2="230" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,228 410,238 416,228" fill="var(--connector)"/>

  <!-- DECISION: Parse confidence -->
  <polygon points="410,240 540,315 410,390 280,315" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="410" y="308" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Parse</text>
  <text x="410" y="323" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">confidence?</text>

  <!-- RIGHT: Low confidence -->
  <line x1="540" y1="315" x2="658" y2="315" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="656,309 666,315 656,321" fill="var(--connector)"/>
  <text x="599" y="305" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Low</text>

  <rect x="670" y="285" width="140" height="60" rx="6" fill="var(--red)" stroke="#DC2626" stroke-width="2"/>
  <text x="740" y="310" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Flag as</text>
  <text x="740" y="325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">"Low-confidence parse"</text>

  <!-- Low-confidence continues down to merge — arrow connects to merge circle -->
  <line x1="740" y1="345" x2="740" y2="450" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="740" y1="450" x2="415" y2="450" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="417,444 407,450 417,456" fill="var(--connector)"/>

  <!-- Annotation: edge cases — rendered AFTER the dashed lines so opaque bg is on top -->
  <rect x="660" y="355" width="160" height="50" rx="6" fill="#fff" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="740" y="373" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">Multi-column, graphic-heavy,</text>
  <text x="740" y="387" text-anchor="middle" fill="var(--gray-700)" font-size="10" font-style="italic">or non-standard layouts</text>

  <!-- DOWN: High confidence -->
  <line x1="410" y1="390" x2="410" y2="445" stroke="var(--connector)" stroke-width="2"/>
  <text x="425" y="425" fill="var(--gray-500)" font-size="11" font-weight="600">High</text>

  <!-- Merge -->
  <circle cx="410" cy="450" r="5" fill="var(--connector)"/>
  <line x1="410" y1="455" x2="410" y2="490" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,488 410,498 416,488" fill="var(--connector)"/>

  <!-- PROCESS: Store structured output -->
  <rect x="270" y="500" width="280" height="70" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="410" y="527" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Store structured output</text>
  <text x="410" y="544" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">→ Canonical candidate record</text>
  <text x="410" y="558" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">with all parsed fields</text>

  <line x1="410" y1="570" x2="410" y2="610" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,608 410,618 416,608" fill="var(--connector)"/>

  <!-- OUTPUT: Display to Leo -->
  <polygon points="315,625 295,695 525,695 505,625" fill="var(--purple)" stroke="#7C3AED" stroke-width="2"/>
  <text x="410" y="650" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Display parsed data</text>
  <text x="410" y="667" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Leo reviews structured fields</text>

  <line x1="410" y1="695" x2="410" y2="735" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,733 410,743 416,733" fill="var(--connector)"/>

  <!-- DECISION: Needs edits? -->
  <polygon points="410,745 520,805 410,865 300,805" fill="var(--orange)" stroke="#D97706" stroke-width="2"/>
  <text x="410" y="800" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Leo needs</text>
  <text x="410" y="815" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">to edit?</text>

  <!-- RIGHT: Yes, edit -->
  <line x1="520" y1="805" x2="638" y2="805" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="636,799 646,805 636,811" fill="var(--connector)"/>
  <text x="579" y="795" text-anchor="middle" fill="var(--gray-500)" font-size="11" font-weight="600">Yes</text>

  <rect x="650" y="770" width="150" height="70" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="725" y="797" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Manual edit</text>
  <text x="725" y="814" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Inline field editing</text>
  <text x="725" y="828" text-anchor="middle" fill="#fff" font-size="10" opacity="0.85">Edit history preserved</text>

  <!-- Loop back after edit -->
  <line x1="725" y1="840" x2="725" y2="890" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <line x1="725" y1="890" x2="415" y2="890" stroke="var(--connector)" stroke-width="2" stroke-dasharray="6"/>
  <polygon points="417,884 407,890 417,896" fill="var(--connector)"/>

  <!-- DOWN: No edits -->
  <line x1="410" y1="865" x2="410" y2="890" stroke="var(--connector)" stroke-width="2"/>
  <text x="425" y="882" fill="var(--gray-500)" font-size="11" font-weight="600">No</text>
  <circle cx="410" cy="890" r="5" fill="var(--connector)"/>

  <line x1="410" y1="895" x2="410" y2="930" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,928 410,938 416,928" fill="var(--connector)"/>

  <!-- PROCESS: Validate & sanitize -->
  <rect x="270" y="940" width="280" height="60" rx="6" fill="var(--teal)" stroke="#0F766E" stroke-width="2"/>
  <text x="410" y="965" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Validate &amp; sanitize</text>
  <text x="410" y="982" text-anchor="middle" fill="#fff" font-size="11" opacity="0.85">Injection protection, encoding</text>

  <line x1="410" y1="1000" x2="410" y2="1035" stroke="var(--connector)" stroke-width="2"/>
  <polygon points="404,1033 410,1043 416,1033" fill="var(--connector)"/>

  <!-- END -->
  <rect x="240" y="1045" width="340" height="48" rx="24" fill="var(--green)"/>
  <text x="410" y="1074" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">→ Parsed · Ready for LLM Scoring (§4)</text>

</svg>
</div>
</body>
</html>
